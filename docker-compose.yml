services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chatdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chatdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    env_file: .env
    environment:
      # `db` is the service name — compose resolves it via DNS. `localhost` would hit the api container.
      DATABASE_URL: postgresql+psycopg2://chat:chat@db:5432/chatdb
    depends_on:
      db:
        condition: service_healthy    # not just "started" — postgres accepts connections seconds later
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata: